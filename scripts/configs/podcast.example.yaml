# Podcast pipeline configuration
# ─────────────────────────────────────────────────────────────────────

# PDF parsing
pdf_parser: pymupdf         # pymupdf | docling
max_toc_level: 1            # 1 = Parts/Chapters, 2 = sub-chapters

# Dialogue settings
dialogue:
  format: two_hosts         # two_hosts | host_guest
  speaker1_name: Alex
  speaker2_name: Sam
  source_lang: en           # language of the source PDF/URL
  target_lang: en           # language for the podcast dialogue
  # target_duration_min: 60 # optional — hint the outline LLM for target length
  words_per_minute: 150     # estimation only (duration display), does not affect audio speed
  segment_target_words: 1200  # ~8 min per segment at 150 wpm

# LLM backend — uncomment the one you want to use
llm:
  # ── Ollama (local server) ──
  backend: ollama
  model: qwen3:14b
  num_ctx: 40960
  temperature: 0.7

  # ── MLX (Apple Silicon, local) ──
  # backend: mlx
  # model: Qwen/Qwen3-14B-MLX-4bit

# TTS backend
tts:
  backend: kokoro
  voices: [bf_emma, bm_george]
  speeds: [1.0, 1.2]         # per-voice speeds

  # ── Chatterbox (voice cloning) ──
  # backend: chatterbox
  # audio_prompts: [voices/host.wav, voices/guest.wav]
